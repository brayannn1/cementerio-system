<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cementerio system</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
       <h1>Sistema cementerio</h1>
    
        <input
        type="text"
        id="nombre"
        placeholder="Ingrese nombre"
    >

    <button onclick="buscarFallecido()">
        Buscar
    </button>

    <button onclick="cargarFallecidos()">
    Mostrar todos
</button>
<hr>
    <input
    type="text"
    id="sector"
    placeholder="Ingrese sector"
/>

<button onclick="buscarSector()">
    Buscar sector
</button>
<hr>
<input type="date" id="fecha1">
<input type="date" id="fecha2">

<button onclick="buscarFechas()">
    Buscar fechas
</button>

<hr>

<h2>Agregar Fallecido</h2>

<input
    type="text"
    id="nuevoNombre"
    placeholder="Nombre"
/>

<br><br>

<label for="fechaNacimiento">
    Fecha de nacimiento
</label>
<br>

<input
    type="date"
    id="fechaNacimiento"
/>

<br><br>

<label for="fechaFallecimiento">
    Fecha de fallecimiento
</label>
<br>

<input
    type="date"
    id="fechaFallecimiento"
/>

<br><br>

<textarea
    id="biografia"
    placeholder="Biografía"
></textarea>

<br><br>

<label for="idSepultura">
    Sepultura disponible
</label>

<br>

<select id="idSepultura">
    <option value="">
        Cargando...
    </option>
</select>

<br><br>

<button onclick="agregarFallecido()">
    Guardar Fallecido
</button>

<hr>
<hr>

    <hr>
    <div id="detalle"></div>
    <hr>
    <div id="resultado"></div>


    <script src="js/app.js"></script>
</body>
</html>
