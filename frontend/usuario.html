<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Usuario</title>
    <link rel="stylesheet" href="css/global.css">

</head>
<body class ="usuario-page">

    <div>

        <p id="bienvenida"></p>

    </div>

     <hr>

    </button>


</header>


    <div class="panel-admin">

        </div>

        </div>

    <hr>

    <div id="contenidoUsuario"></div>

    <script src="js/usuario/usuario.js"></script>
