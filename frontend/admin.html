<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-page">

    <header class="header-principal">

    <div>

        <h1>Panel de Administración</h1>

        <p>
            Gestion de cementerio
        </p>

    </div>
    <hr>
    <button onclick="cerrarSesion()">
        Cerrar sesión
    </button>

</header>

    <div class="panel-admin">

        <div class="modulo">
            <h2>Fallecidos</h2>
            <button onclick="mostrarFallecidos()">
                Gestionar
            </button>
        </div>

        <div class="modulo">
            <h2>Sepulturas</h2>
            <button onclick="mostrarSepulturas()">
                Gestionar
            </button>
        </div>

        <div class="modulo">
            <h2>Sectores</h2>
            <button onclick="mostrarSectores()">
                Gestionar
            </button>
        </div>

        <div class="modulo">
            <h2>Usuarios</h2>
            <button onclick="mostrarUsuarios()">
                Gestionar
            </button>
        </div>

        <div class="modulo">
            <h2>Eventos</h2>
            <button onclick="mostrarEventos()">
                Gestionar
            </button>
        </div>

        <div class="modulo">
            <h2>Visitas</h2>
            <button onclick="mostrarVisitas()">
                Gestionar
            </button>
        </div>

        <div class="modulo">
            <h2>Comentarios</h2>
            <button onclick="mostrarComentarios()">
                Gestionar
            </button>
        </div>


    </div>

    <hr>

    <div id="contenidoAdmin">

    </div>

    <script src="js/admin/admin.js"></script>
    <script src="js/admin/adminFallecidos.js"></script>
    <script src="js/admin/adminSepulturas.js"></script>
    <script src="js/admin/adminSectores.js"></script>
    <script src="js/admin/adminEventos.js"></script>
    <script src="js/admin/adminUsuarios.js"></script>
    <script src="js/admin/adminVisitas.js"></script>
    <script src="js/admin/adminComentarios.js"></script>

</html>
