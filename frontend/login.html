<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Iniciar Sesión</h1>

    <input

        id="contrasena"
        placeholder="Contraseña"
    >

    <br><br>

    <button onclick="login()">

    <script src="js/login.js"></script>

</body>
</html>
